<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f1221,#1a1f3a);
  color:white;
  margin:0;
}

/* TITLE */
h1 {
  text-align:center;
  padding:20px;
  background:linear-gradient(90deg,#6c63ff,#ff6b9d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.4s;
  transform: translateY(30px);
  opacity:0;
}

/* HOVER */
.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow:0 10px 40px rgba(108,99,255,0.4);
}

/* ANIMATION */
.card.show {
  opacity:1;
  transform: translateY(0);
}

/* INPUT */
input, textarea, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  background:#2a2f5a;
  color:white;
}

/* BUTTON */
button {
  padding:10px;
  background:linear-gradient(90deg,#6c63ff,#5848ff);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow:0 0 15px #6c63ff;
}

/* RESUME */
.resume {
  background:white;
  color:black;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.header {
  background:#6c63ff;
  color:white;
  padding:15px;
}

.section {
  padding:10px;
}

canvas {
  width:100%;
}
</style>
</head>

<body>

<h1>🚀 StudKit Pro</h1>

<div class="container">

<!-- WORD -->
<div class="card">
<h2>Word Counter</h2>
<textarea id="text" oninput="countWords()"></textarea>
<p>Words: <span id="count">0</span></p>
</div>

<!-- TTS -->
<div class="card">
<h2>Text to Speech</h2>
<textarea id="tts"></textarea>
<button onclick="speak()">Speak</button>
</div>

<!-- PDF -->
<div class="card">
<h2>Image → PDF</h2>
<input type="file" id="images" multiple>
<button onclick="makePDF()">Download PDF</button>
</div>

<!-- RESIZE -->
<div class="card">
<h2>Image Resize</h2>
<input type="file" id="img">

<select id="unit">
<option value="px">Pixels</option>
<option value="%">Percentage</option>
</select>

<input type="number" id="size" placeholder="Enter size">

<label><input type="checkbox" id="lock" checked> Lock Ratio</label>

<select id="format">
<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
</select>

<input type="range" id="quality" min="0.1" max="1" step="0.1" value="1">

<button onclick="resize()">Resize</button>
<button onclick="downloadImg()">Download</button>

<canvas id="canvas"></canvas>
</div>

<!-- RESUME -->
<div class="card">
<h2>Resume Builder</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<textarea id="summary" placeholder="Summary"></textarea>
<textarea id="skills" placeholder="Skills comma"></textarea>

<button onclick="generateResume()">Generate</button>
<button onclick="downloadResume()">Download</button>

<div id="resume"></div>
</div>

</div>

<script>

// ANIMATION ON SCROLL
let cards = document.querySelectorAll(".card");
window.addEventListener("scroll", ()=>{
cards.forEach(card=>{
let top = card.getBoundingClientRect().top;
if(top < window.innerHeight - 50){
card.classList.add("show");
}
});
});

// WORD
function countWords(){
let words = text.value.trim().split(/\s+/);
count.innerText = text.value ? words.length : 0;
}

// TTS
function speak(){
let speech = new SpeechSynthesisUtterance(tts.value);
speechSynthesis.speak(speech);
}

// PDF
function makePDF(){
const { jsPDF } = window.jspdf;
let pdf = new jsPDF();
let files = images.files;
let i=0;

function add(){
if(i>=files.length){ pdf.save("images.pdf"); return; }

let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.src=e.target.result;

img.onload=function(){
if(i>0) pdf.addPage();
pdf.addImage(img,'JPEG',10,10,180,0);
i++;
add();
}
}
reader.readAsDataURL(files[i]);
}
add();
}

// RESIZE
let resizedData;

function resize(){
let file = img.files[0];
if(!file) return alert("Select image");

let reader = new FileReader();

reader.onload = function(e){
let image = new Image();
image.src = e.target.result;

image.onload = function(){

let size = document.getElementById("size").value;
let unit = document.getElementById("unit").value;
let lock = document.getElementById("lock").checked;

let newW,newH;

if(unit=="px"){
newW=size;
newH= lock ? size*(image.height/image.width) : size;
}else{
newW=image.width*(size/100);
newH=image.height*(size/100);
}

canvas.width=newW;
canvas.height=newH;

let ctx=canvas.getContext("2d");
ctx.drawImage(image,0,0,newW,newH);

resizedData=canvas.toDataURL();
}
}
reader.readAsDataURL(file);
}

function downloadImg(){
if(!resizedData) return alert("Resize first");

let format=document.getElementById("format").value;
let quality=document.getElementById("quality").value;

let a=document.createElement("a");
a.href=canvas.toDataURL(format,quality);
a.download="image";
a.click();
}

// RESUME
function generateResume(){
let skillHTML = skills.value.split(",").map(s=>`<li>${s}</li>`).join("");

resume.innerHTML=`
<div class="resume">
<div class="header">
<h2>${name.value}</h2>
<p>${email.value} | ${phone.value}</p>
</div>

<div class="section">
<h3>Summary</h3>
<p>${summary.value}</p>
</div>

<div class="section">
<h3>Skills</h3>
<ul>${skillHTML}</ul>
</div>
</div>
`;
}

async function downloadResume(){
const { jsPDF } = window.jspdf;

let canvasImg = await html2canvas(resume);
let img = canvasImg.toDataURL("image/png");

let pdf = new jsPDF();
pdf.addImage(img,'PNG',10,10,180,0);
pdf.save("resume.pdf");
}

let compressedData;

function formatSize(bytes) {
  return (bytes / 1024).toFixed(2) + " KB";
}

</script>
</body>
